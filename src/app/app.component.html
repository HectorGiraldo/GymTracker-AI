<main class="min-h-screen bg-background text-foreground">
  <header class="bg-secondary border-b border-white/10 p-4 sticky top-0 z-50">
    <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
      <h1 class="text-2xl font-bold flex items-center gap-2 text-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
        </svg>
        GymTracker
      </h1>
      <nav class="flex items-center gap-4 sm:gap-6 overflow-x-auto w-full sm:w-auto pb-2 sm:pb-0 justify-center sm:justify-end">
        <a routerLink="/" routerLinkActive="font-bold text-primary" [routerLinkActiveOptions]="{exact: true}" class="text-gray-300 hover:text-primary transition-colors whitespace-nowrap">
          {{ workoutState.activeRoutine() ? 'Mi Rutina' : 'Generador' }}
        </a>
        <a routerLink="/history" routerLinkActive="font-bold text-primary" class="text-gray-300 hover:text-primary transition-colors whitespace-nowrap">Historial</a>
        <a routerLink="/profile" routerLinkActive="font-bold text-primary" class="text-gray-300 hover:text-primary transition-colors whitespace-nowrap">Perfil</a>
      </nav>
    </div>
  </header>
  
  <div class="container mx-auto p-4 mt-8">
    <router-outlet></router-outlet>
  </div>
</main>
